# VNC WebSocket proxy with resilience tuning
# This proxies noVNC (port 6080) through nginx with:
# - Proper WebSocket upgrade handling
# - Extended timeouts for long VNC sessions
# - Connection buffering to handle CloudFront edge cases
# - Custom resilient VNC page

server {
    listen 6081;
    listen [::]:6081;
    server_name _;

    # Serve our custom resilient VNC page
    location = /vnc_auto.html {
        alias /workspace/browser-automation/vnc/vnc_resilient.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Proxy everything else to noVNC on 6080
    location / {
        proxy_pass http://127.0.0.1:6080;
        proxy_http_version 1.1;

        # WebSocket upgrade — critical for VNC
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Extended timeouts for long VNC sessions
        proxy_read_timeout 86400s;    # 24 hours
        proxy_send_timeout 86400s;    # 24 hours
        proxy_connect_timeout 10s;    # 10 seconds to establish

        # Buffering tuning for WebSocket
        proxy_buffering off;
        proxy_buffer_size 8k;

        # Don't cache WebSocket connections
        proxy_cache off;

        # TCP tuning
        tcp_nodelay on;
    }

    # WebSocket endpoint specifically
    location /websockify {
        proxy_pass http://127.0.0.1:6080/websockify;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Extended timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;

        # Critical: disable buffering for WebSocket
        proxy_buffering off;
        tcp_nodelay on;

        # Retry on connection failure
        proxy_next_upstream error timeout;
        proxy_next_upstream_tries 3;
    }
}